info:
  name: Create Order
  type: http
  seq: 14

http:
  method: POST
  url: http://localhost:4000/orders
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "user_id": 1,
        "items": [
          { "comic_id": 1, "quantity": 1, "price": 10.99 }
        ],
        "total_amount": 10.99
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
