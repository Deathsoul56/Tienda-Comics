info:
  name: Register User
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:4000/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "user_name": "janed123",
        "email": "jane.test@example.com",
        "password": "Password123!",
        "first_name": "Jane",
        "last_name": "Test"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
