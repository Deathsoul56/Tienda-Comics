info:
  name: Register User
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:4000/auth/register
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "user_name": "janed123",
        "email": "jane.test@example.com",
        "password": "Password123!",
        "first_name": "Jane",
        "last_name": "Test"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Register User
  **¿Qué hace?**
  Inscribe y cifra a un nuevo cliente insertándolo directamente en la tabla Users de la DB.
  
  **Entrada:** Obligatoriamente envía `first_name`, `last_name`, `email`, `password` y `user_name`.
  
  **Salida:** Mensaje de creación exitosa 201 y asignación de `role: user`.
  
  **Uso en la página:** Ejecutado en el formulario de `Register / Crear Cuenta` de tu módulo de autenticación.
