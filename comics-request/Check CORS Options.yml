info:
  name: Check CORS Options
  type: http
  seq: 15

http:
  method: OPTIONS
  url: http://localhost:4000/comics
  headers:
    - name: Access-Control-Request-Method
      value: GET
    - name: Origin
      value: http://localhost:3000
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
