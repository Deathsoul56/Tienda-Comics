info:
  name: Get Comics
  type: http
  seq: 7

http:
  method: GET
  url: http://localhost:4000/comics?author=Brian K. Vaughan&publisher=Vertigo&genre=Science Fiction&priceRange=1-5&order=price_desc
  params:
    - name: author
      value: Brian K. Vaughan
      type: query
    - name: publisher
      value: Vertigo
      type: query
    - name: genre
      value: Science Fiction
      type: query
    - name: priceRange
      value: 1-5
      type: query
    - name: order
      value: price_desc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Get Comics
  **¿Qué hace?**
  Obtiene el listado principal de cómics. Soporta paginación u ordenamiento basado en los parámetros de búsqueda.
  
  **Entrada:** Parámetros Query opcionales (`author`, `publisher`, `genre`, `priceRange`, `order`).
  
  **Salida:** Array de objetos Cómic (con `comic_id`, `title`, `price`, `stock`, `cover_image_url`).
  
  **Uso en la página:** En el `Home` principal (grilla de cómics) y se refresca automáticamente al cambiar la selección en los filtros.
