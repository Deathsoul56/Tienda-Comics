info:
  name: Login User
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:4000/auth/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "john.doe@example.com",
        "password": "hashed_password_1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |
  # Login User
  **¿Qué hace?**
  Valida las credenciales de un visitante e inicia su sesión entregando su carga útil de estado.
  
  **Entrada:** Body JSON con su correo (`email`) y `password` plana.
  
  **Salida:** Token JWT de autorización y un perfil con `user_id`, `role`, y `user_name`.
  
  **Uso en la página:** Modal u obelisco de `Login` inicial cuando no hay un token local guardado. 
